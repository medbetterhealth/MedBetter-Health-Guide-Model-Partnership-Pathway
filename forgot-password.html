<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — GUIDE Partnership Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{font-family:'Geist',sans-serif;color:#1a2b3c;}

  /* Full-viewport split layout: brand panel + form panel on desktop,
     stacked single column on mobile. */
  .auth-shell{display:flex;min-height:100vh;min-height:100dvh;}

  .brand-panel{flex:0 0 42%;position:relative;overflow:hidden;background:linear-gradient(135deg,#0a3d6e,#1a5a9a);color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:48px 40px;}
  .brand-panel::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 25% 20%,rgba(255,255,255,.10),transparent 55%),radial-gradient(circle at 80% 85%,rgba(255,255,255,.08),transparent 55%);}
  .brand-logo-card{position:relative;z-index:1;background:#fff;border-radius:18px;padding:18px 26px;box-shadow:0 14px 40px rgba(0,0,0,.25);margin-bottom:26px;}
  .brand-logo-card img{height:44px;width:auto;display:block;}
  .brand-panel h1{position:relative;z-index:1;font-size:24px;font-weight:700;margin-bottom:12px;}
  .brand-panel p{position:relative;z-index:1;font-size:14px;line-height:1.6;color:rgba(255,255,255,.88);max-width:340px;}

  .form-panel{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;background:#f4f8fc;overflow-y:auto;}

  .card{max-width:420px;width:100%;background:#fff;border:1px solid #e6ebf0;border-radius:20px;overflow:hidden;box-shadow:0 14px 40px rgba(10,43,60,.12);}
  .hero{padding:26px 30px;color:#fff;background:linear-gradient(135deg,#0a3d6e,#1a5a9a);}
  .hero h2{font-size:21px;font-weight:700;}
  .hero p{font-size:13px;opacity:.9;margin-top:4px;}

  .body{padding:24px 30px 30px;}
  .field{margin-bottom:15px;}
  .field label{display:block;font-size:13px;font-weight:600;color:#243b53;margin-bottom:6px;}
  .field input{width:100%;padding:10px 12px;border:1.5px solid #d8e2ec;border-radius:9px;font-family:inherit;font-size:14px;transition:.2s;}
  .field input:focus{outline:none;border-color:#0a3d6e;box-shadow:0 0 0 3px rgba(10,61,110,.12);}
  .field input.error{border-color:#d12128;}
  .err-msg{font-size:12px;color:#d12128;margin-top:5px;display:none;}
  .err-msg.show{display:block;}

  .btn-primary{width:100%;background:#1d9e75;color:#fff;border:none;padding:13px 20px;border-radius:24px;font-weight:700;font-size:15px;cursor:pointer;font-family:inherit;box-shadow:0 6px 16px rgba(29,158,117,.4);transition:.2s;}
  .btn-primary:hover{transform:translateY(-1px);box-shadow:0 9px 22px rgba(29,158,117,.5);}

  .foot-link{text-align:center;margin-top:18px;font-size:13px;color:#5f7387;}
  .foot-link a{color:#0a3d6e;font-weight:600;text-decoration:none;}
  .foot-link a:hover{text-decoration:underline;}

  .alert{background:#fdecec;border:1.5px solid #f2c4c5;color:#8a1a1f;border-radius:10px;padding:12px 14px;font-size:13px;margin-bottom:16px;display:none;}
  .alert.show{display:block;}
  .alert.success{background:#eafaf1;border-color:#b6e3ce;color:#0a5c3f;}

  .confirm-box{display:none;text-align:center;}
  .confirm-box .ic{font-size:38px;margin-bottom:10px;}
  .confirm-box p{font-size:13.5px;color:#5f7387;line-height:1.5;margin-bottom:20px;}

  /* Mobile: collapse to a single scrolling column, compact brand strip on top */
  @media(max-width:900px){
    .auth-shell{flex-direction:column;min-height:100dvh;}
    .brand-panel{flex:0 0 auto;padding:26px 20px;}
    .brand-logo-card{padding:10px 16px;margin-bottom:10px;}
    .brand-logo-card img{height:32px;}
    .brand-panel h1{font-size:18px;margin-bottom:4px;}
    .brand-panel p{display:none;}
    .form-panel{padding:24px 16px 40px;}
  }
  @media(max-width:420px){
    .card{border-radius:14px;}
    .hero{padding:20px 22px;}
    .body{padding:20px 22px 24px;}
  }
</style>
</head>
<body>

<div class="auth-shell">
  <div class="brand-panel">
    <div class="brand-logo-card">
      <img src="https://medbetterhealth.org/wp-content/uploads/2025/01/medbetter_logo.svg" alt="MedBetterHealth">
    </div>
    <h1>GUIDE Partnership Portal</h1>
    <p>We'll help you get back into your partner account.</p>
  </div>

  <div class="form-panel">
    <div class="card">
      <div class="hero">
        <h2>Reset your password</h2>
        <p>We'll send a reset link to your email</p>
      </div>
      <div class="body">
        <div class="alert" id="formAlert"></div>

        <form id="resetForm">
          <div class="field">
            <label>Email</label>
            <input type="email" id="resetEmail" autocomplete="username" placeholder="you@youragency.com">
            <div class="err-msg" id="err-resetEmail"></div>
          </div>
          <button type="submit" class="btn-primary">Send Reset Link</button>
        </form>

        <div class="confirm-box" id="confirmBox">
          <div class="ic">✅</div>
          <p>If an account exists for that email, a password reset link has been sent. Check your inbox — the link expires in 1 hour.</p>
        </div>

        <div class="foot-link"><a href="login.html">← Back to sign in</a></div>
      </div>
    </div>
  </div>
</div>

<script src="data-store.js?v=4"></script>
<script src="partner-api.js?v=7"></script>
<script>
  function setError(fieldId, message) {
    const input = document.getElementById(fieldId);
    const err = document.getElementById(`err-${fieldId}`);
    if (message) {
      input.classList.add('error');
      err.textContent = message;
      err.classList.add('show');
    } else {
      input.classList.remove('error');
      err.classList.remove('show');
    }
  }

  document.getElementById('resetForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('resetEmail').value.trim();
    if (!DataStore.isValidEmail(email)) {
      setError('resetEmail', 'Enter a valid email address.');
      return;
    }
    setError('resetEmail', '');

    const submitBtn = e.target.querySelector('button[type="submit"]');
    if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = 'Sending…'; }
    try {
      // Real email, sent by the request-password-reset backend function
      // (SendGrid) — see partner-api.js's file header.
      await PartnerAPI.sendPasswordResetEmail(email);
    } catch (err) {
      // Still show the same generic confirmation even on error, so this
      // form can't be used to probe which emails exist — but log it so
      // you can notice a broken email service in the browser console.
      console.error('[forgot-password] request failed:', err.message);
    } finally {
      document.getElementById('resetForm').style.display = 'none';
      document.getElementById('confirmBox').style.display = 'block';
    }
  });
</script>
</body>
</html>
